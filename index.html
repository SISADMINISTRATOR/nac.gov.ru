<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАК России - Официальный портал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .top-bar {
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 12px;
            color: #666;
        }
        .top-left, .top-right {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .top-bar button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 12px;
        }
        .top-bar button:hover {
            color: #002B5E;
        }
        .lang-switch {
            display: flex;
            gap: 5px;
        }
        .lang-switch button.active {
            font-weight: bold;
            color: #002B5E;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 5px solid #002B5E;
        }
        .emblem {
            width: 60px;
            height: 60px;
            background: #ca8a04;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .title h1 {
            font-size: 18px;
            color: #002B5E;
        }
        .nav {
            background: #002B5E;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav button {
            background: none;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
        }
        .nav button:hover {
            text-decoration: underline;
        }
        .report-card, .news-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .report-card h2, .news-card h2 {
            font-size: 18px;
            color: #002B5E;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        .submit-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:hover {
            background: #b91c1c;
        }
        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #92400e;
            margin-bottom: 16px;
        }
        .news-item {
            padding: 16px 0;
            border-bottom: 1px solid #eee;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-date {
            font-size: 11px;
            color: #dc2626;
            margin-bottom: 6px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
        }
        .news-desc {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #999;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
        }
        .modal-content h3 {
            color: #002B5E;
            margin-bottom: 16px;
        }
        .modal-content p {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        .close-modal {
            background: #002B5E;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        .checkbox-group {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input {
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <button onclick="showRegion()">📍 Небогорская область</button>
        <button onclick="showVision()">👁️ Версия для слабовидящих</button>
    </div>
    <div class="top-right">
        <div class="lang-switch">
            <button id="ruBtn" onclick="setLang('ru')" class="active">Рус</button>
            <span>/</span>
            <button id="enBtn" onclick="setLang('en')">En</button>
        </div>
        <button onclick="showEmployeeLogin()" style="background:#002B5E; color:white; padding:4px 12px; border-radius:20px;">👮 Вход для сотрудников</button>
    </div>
</div>

<div class="header">
    <div class="emblem">🛡️</div>
    <div class="title">
        <h1 id="mainTitle">Национальный антитеррористический комитет</h1>
    </div>
</div>

<div class="nav">
    <button onclick="showInfo('about')" id="aboutBtn">О Комитете</button>
    <button onclick="showInfo('activity')" id="activityBtn">Деятельность НАК</button>
    <button onclick="showInfo('terror')" id="terrorBtn">Терроризму - НЕТ!</button>
    <button onclick="showInfo('law')" id="lawBtn">Нормативная база</button>
    <button onclick="showInfo('media')" id="mediaBtn">Медиа</button>
    <button onclick="showInfo('regions')" id="regionsBtn">Регионы</button>
</div>

<!-- Форма подачи заявления -->
<div class="report-card">
    <h2 id="reportTitle">📝 Подать заявление</h2>
    <div class="warning" id="warningText">
        ⚠️ Внимание! Заведомо ложный вызов влечёт административную и уголовную ответственность.
    </div>
    
    <input type="text" id="rpUsername" placeholder="Ваш Username в Roblox">
    <input type="text" id="targetUsername" placeholder="Username человека на которого подаёте заявление">
    <textarea id="description" rows="3" placeholder="Описание нарушения (терракт, стрельба, неадекватное поведение, подготовка преступления и т.д.)"></textarea>
    <input type="text" id="rpFIO" placeholder="Ваше РП ФИО">
    <input type="text" id="targetFIO" placeholder="РП ФИО правонарушителя">
    
    <div class="checkbox-group">
        <input type="checkbox" id="confirmLiability">
        <label for="confirmLiability" id="liabilityLabel">Я ознакомлен и готов понести наказание за ложный вызов</label>
    </div>
    
    <button class="submit-btn" id="submitReportBtn" onclick="submitReport()">📨 Отправить заявление</button>
</div>

<!-- Новости (пусто, будет заполняться через второй сайт) -->
<div class="news-card">
    <h2 id="newsTitle">📰 Официальные новости</h2>
    <div id="newsList">
        <div class="empty" id="emptyNewsText">📭 Новости будут добавлены позже</div>
    </div>
</div>

<div class="footer">
    <p id="footerText">© 2026 Национальный антитеррористический комитет | Небогорская область</p>
</div>

<script>
    let news = [];
    let lang = 'ru';
    
    const text = {
        ru: {
            mainTitle: 'Национальный антитеррористический комитет',
            aboutBtn: 'О Комитете',
            activityBtn: 'Деятельность НАК',
            terrorBtn: 'Терроризму - НЕТ!',
            lawBtn: 'Нормативная база',
            mediaBtn: 'Медиа',
            regionsBtn: 'Регионы',
            reportTitle: '📝 Подать заявление',
            warningText: '⚠️ Внимание! Заведомо ложный вызов влечёт административную и уголовную ответственность.',
            liabilityLabel: 'Я ознакомлен и готов понести наказание за ложный вызов',
            newsTitle: '📰 Официальные новости',
            footerText: '© 2026 Национальный антитеррористический комитет | Небогорская область',
            emptyNews: '📭 Новости будут добавлены позже',
            close: 'Закрыть',
            submitAlert: 'Заявление отправлено! Ожидайте рассмотрения.',
            confirmAlert: 'Подтвердите, что готовы нести ответственность за ложный вызов',
            fillAlert: 'Заполните все поля'
        },
        en: {
            mainTitle: 'National Anti-Terrorism Committee',
            aboutBtn: 'About Committee',
            activityBtn: 'NAC Activities',
            terrorBtn: 'NO to Terrorism!',
            lawBtn: 'Legal Framework',
            mediaBtn: 'Media',
            regionsBtn: 'Regions',
            reportTitle: '📝 Submit a Report',
            warningText: '⚠️ Attention! False report leads to administrative and criminal liability.',
            liabilityLabel: 'I acknowledge and accept liability for false reporting',
            newsTitle: '📰 Official News',
            footerText: '© 2026 National Anti-Terrorism Committee | Nebogorsk Oblast',
            emptyNews: '📭 News will be added later',
            close: 'Close',
            submitAlert: 'Report submitted! Awaiting review.',
            confirmAlert: 'Confirm that you accept liability for false reporting',
            fillAlert: 'Please fill in all fields'
        }
    };
    
    const infoData = {
        ru: {
            about: { title: 'О Комитете', content: 'Национальный антитеррористический комитет (НАК) - орган, координирующий деятельность по противодействию терроризму. Председатель - директор ФСБ России.' },
            activity: { title: 'Деятельность НАК', content: 'Основные направления: координация антитеррористической деятельности, разработка мер противодействия, организация учений, информирование населения, международное сотрудничество.' },
            terror: { title: 'Терроризму - НЕТ!', content: 'Будьте бдительны! Сообщайте о подозрительных предметах по телефону 112. Не трогайте бесхозные вещи. Телефон доверия: 8-800-XXX-XXXX' },
            law: { title: 'Нормативная база', content: 'ФЗ №35 "О противодействии терроризму", Концепция противодействия терроризму, Указы Президента, Постановления Правительства.' },
            media: { title: 'Медиа', content: 'Официальный сайт: nac.gov.ru, YouTube-канал, Telegram-канал, пресс-центр, фотогалерея.' },
            regions: { title: 'Регионы', content: 'В каждом регионе созданы антитеррористические комиссии. В Небогорской области действует региональная комиссия.' },
            region: { title: 'Небогорская область', content: 'Субъект РФ. Действует антитеррористическая комиссия. Телефон доверия: 8-800-XXX-XX-XX. Экстренная служба: 112' },
            vision: { title: 'Версия для слабовидящих', content: 'Используйте Ctrl + для увеличения шрифта. В настройках браузера включите высокую контрастность.' }
        },
        en: {
            about: { title: 'About Committee', content: 'The National Anti-Terrorism Committee (NAC) coordinates counter-terrorism activities. Chairman is Director of the FSB of Russia.' },
            activity: { title: 'NAC Activities', content: 'Main areas: counter-terrorism coordination, development of counter-measures, exercises organization, public information, international cooperation.' },
            terror: { title: 'NO to Terrorism!', content: 'Stay vigilant! Report suspicious items to 112. Do not touch unattended items. Hotline: 8-800-XXX-XXXX' },
            law: { title: 'Legal Framework', content: 'Federal Law No. 35 "On Countering Terrorism", Counter-Terrorism Concept, Presidential Decrees, Government Resolutions.' },
            media: { title: 'Media', content: 'Official website: nac.gov.ru, YouTube channel, Telegram channel, press center, photo gallery.' },
            regions: { title: 'Regions', content: 'Anti-terrorism commissions operate in every region. Nebogorsk Oblast has its regional commission.' },
            region: { title: 'Nebogorsk Oblast', content: 'Federal subject of Russia. Anti-terrorism commission operates. Hotline: 8-800-XXX-XX-XX. Emergency: 112' },
            vision: { title: 'Accessibility Mode', content: 'Use Ctrl + to increase font size. Enable high contrast in browser settings.' }
        }
    };
    
    function setLang(newLang) {
        lang = newLang;
        document.getElementById('ruBtn').classList.toggle('active', lang === 'ru');
        document.getElementById('enBtn').classList.toggle('active', lang === 'en');
        
        document.getElementById('mainTitle').innerText = text[lang].mainTitle;
        document.getElementById('aboutBtn').innerText = text[lang].aboutBtn;
        document.getElementById('activityBtn').innerText = text[lang].activityBtn;
        document.getElementById('terrorBtn').innerText = text[lang].terrorBtn;
        document.getElementById('lawBtn').innerText = text[lang].lawBtn;
        document.getElementById('mediaBtn').innerText = text[lang].mediaBtn;
        document.getElementById('regionsBtn').innerText = text[lang].regionsBtn;
        document.getElementById('reportTitle').innerText = text[lang].reportTitle;
        document.getElementById('warningText').innerHTML = text[lang].warningText;
        document.getElementById('liabilityLabel').innerText = text[lang].liabilityLabel;
        document.getElementById('newsTitle').innerText = text[lang].newsTitle;
        document.getElementById('footerText').innerText = text[lang].footerText;
        document.getElementById('emptyNewsText').innerText = text[lang].emptyNews;
        
        renderNews();
    }
    
    function loadNews() {
        let saved = localStorage.getItem('nac_public_news');
        if (saved) {
            news = JSON.parse(saved);
        } else {
            news = [];
        }
        renderNews();
    }
    
    function saveNews() {
        localStorage.setItem('nac_public_news', JSON.stringify(news));
    }
    
    function renderNews() {
        let container = document.getElementById('newsList');
        
        if (news.length === 0) {
            container.innerHTML = '<div class="empty" id="emptyNewsText">' + text[lang].emptyNews + '</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < news.length; i++) {
            let n = news[i];
            html += '<div class="news-item">';
            html += '<div class="news-date">📅 ' + escapeHtml(n.date) + '</div>';
            html += '<div class="news-title">' + escapeHtml(n.title) + '</div>';
            if (n.desc) html += '<div class="news-desc">' + escapeHtml(n.desc) + '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    function submitReport() {
        let username = document.getElementById('rpUsername').value.trim();
        let targetUsername = document.getElementById('targetUsername').value.trim();
        let description = document.getElementById('description').value.trim();
        let rpFIO = document.getElementById('rpFIO').value.trim();
        let targetFIO = document.getElementById('targetFIO').value.trim();
        let confirmed = document.getElementById('confirmLiability').checked;
        
        if (!username || !targetUsername || !description || !rpFIO || !targetFIO) {
            alert(text[lang].fillAlert);
            return;
        }
        
        if (!confirmed) {
            alert(text[lang].confirmAlert);
            return;
        }
        
        let report = {
            id: Date.now(),
            date: new Date().toLocaleString('ru-RU'),
            username: username,
            targetUsername: targetUsername,
            description: description,
            rpFIO: rpFIO,
            targetFIO: targetFIO,
            status: 'pending'
        };
        
        let reports = localStorage.getItem('nac_reports');
        if (reports) {
            reports = JSON.parse(reports);
            reports.unshift(report);
        } else {
            reports = [report];
        }
        localStorage.setItem('nac_reports', JSON.stringify(reports));
        
        alert(text[lang].submitAlert);
        
        document.getElementById('rpUsername').value = '';
        document.getElementById('targetUsername').value = '';
        document.getElementById('description').value = '';
        document.getElementById('rpFIO').value = '';
        document.getElementById('targetFIO').value = '';
        document.getElementById('confirmLiability').checked = false;
    }
    
    function showEmployeeLogin() {
        let password = prompt('Введите пароль для входа в систему сотрудников:');
        if (password === 'NAC2026') {
            window.location.href = 'https://sisadministrator.github.io/nac-staff/';
        } else if (password) {
            alert('Неверный пароль');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
    
    function closeModal() {
        let m = document.querySelector('.modal');
        if (m) m.remove();
    }
    
    function showModal(title, content) {
        closeModal();
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>${escapeHtml(title)}</h3>
                <p>${escapeHtml(content)}</p>
                <button class="close-modal" onclick="closeModal()">${text[lang].close}</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function showInfo(type) {
        let data = infoData[lang][type];
        if (data) showModal(data.title, data.content);
    }
    
    function showRegion() {
        let data = infoData[lang].region;
        showModal(data.title, data.content);
    }
    
    function showVision() {
        let data = infoData[lang].vision;
        showModal(data.title, data.content);
    }
    
    loadNews();
    setLang('ru');
</script>

</body>
      </html>
