<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАК - Новости</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            margin: 0;
        }
        .header {
            background: #002B5E;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .form {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            background: #002B5E;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .news {
            background: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .news h3 {
            color: #002B5E;
            margin-bottom: 8px;
            padding-right: 30px;
        }
        .delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            width: auto;
            color: #999;
        }
        .date {
            color: #666;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️ НАК России</h1>
</div>

<div class="form">
    <h3>➕ Добавить новость</h3>
    <input type="text" id="title" placeholder="Заголовок">
    <textarea id="desc" placeholder="Описание" rows="2"></textarea>
    <button onclick="addNews()">Опубликовать</button>
</div>

<div id="list"></div>

<script>
    let news = [];
    
    function load() {
        const saved = localStorage.getItem('news');
        if (saved) news = JSON.parse(saved);
        render();
    }
    
    function save() {
        localStorage.setItem('news', JSON.stringify(news));
    }
    
    function addNews() {
        const title = document.getElementById('title').value.trim();
        if (!title) return alert('Введите заголовок');
        
        const date = new Date();
        const dateStr = `${date.getDate()} ${date.toLocaleString('ru', { month: 'long' })} ${date.getFullYear()}`;
        
        news.unshift({
            id: Date.now(),
            title: title,
            desc: document.getElementById('desc').value.trim(),
            date: dateStr
        });
        
        save();
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        render();
    }
    
    function deleteNews(id) {
        news = news.filter(n => n.id !== id);
        save();
        render();
    }
    
    function render() {
        const container = document.getElementById('list');
        
        if (news.length === 0) {
            container.innerHTML = '<div class="empty">📭 Новостей пока нет</div>';
            return;
        }
        
        container.innerHTML = news.map(n => `
            <div class="news">
                <button class="delete" onclick="deleteNews(${n.id})">✕</button>
                <h3>${escapeHtml(n.title)}</h3>
                ${n.desc ? `<p>${escapeHtml(n.desc)}</p>` : ''}
                <div class="date">📅 ${n.date}</div>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    load();
</script>

</body>
</html>
