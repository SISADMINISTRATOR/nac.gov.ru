<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАК России</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .top-bar {
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 5px solid #002B5E;
        }
        .emblem {
            width: 60px;
            height: 60px;
            background: #ca8a04;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .title h1 {
            font-size: 18px;
            color: #002B5E;
        }
        .nav {
            background: #002B5E;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .form-card, .news-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-card h2, .news-card h2 {
            font-size: 18px;
            color: #002B5E;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            background: #002B5E;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .news-item {
            padding: 16px 0;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-date {
            font-size: 11px;
            color: #dc2626;
            margin-bottom: 6px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            padding-right: 40px;
        }
        .news-desc {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
        .delete-btn {
            position: absolute;
            top: 16px;
            right: 0;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            padding: 0 8px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div>📍 Выбрать регион</div>
    <div>👁️ Версия для слабовидящих | Рус/En | Контакты 🔍</div>
</div>

<div class="header">
    <div class="emblem">🛡️</div>
    <div class="title">
        <h1>Национальный антитеррористический комитет</h1>
    </div>
</div>

<div class="nav">
    <a href="#">О Комитете</a>
    <a href="#">Деятельность НАК</a>
    <a href="#">Терроризму - НЕТ!</a>
    <a href="#">Нормативная база</a>
    <a href="#">Медиа</a>
    <a href="#">Регионы</a>
</div>

<div class="form-card">
    <h2>➕ Добавить новость</h2>
    <input type="text" id="title" placeholder="Заголовок новости">
    <textarea id="desc" placeholder="Описание (необязательно)" rows="2"></textarea>
    <button onclick="addNews()">Опубликовать</button>
</div>

<div class="news-card">
    <h2>📰 Последние новости</h2>
    <div id="list"></div>
</div>

<div class="footer">
    <p>© 2026 Национальный антитеррористический комитет</p>
</div>

<script>
    let news = [];
    
    function load() {
        let saved = localStorage.getItem('nak_news');
        if (saved) news = JSON.parse(saved);
        render();
    }
    
    function save() {
        localStorage.setItem('nak_news', JSON.stringify(news));
    }
    
    function addNews() {
        let title = document.getElementById('title').value.trim();
        if (!title) {
            alert('Введите заголовок');
            return;
        }
        
        let now = new Date();
        let date = now.getDate() + ' ' + now.toLocaleString('ru', {month: 'long'}) + ' ' + now.getFullYear();
        
        news.unshift({
            id: Date.now(),
            title: title,
            desc: document.getElementById('desc').value.trim(),
            date: date
        });
        
        save();
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        render();
    }
    
    function deleteNews(id) {
        news = news.filter(function(n) {
            return n.id !== id;
        });
        save();
        render();
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function render() {
        let container = document.getElementById('list');
        
        if (news.length === 0) {
            container.innerHTML = '<div class="empty">📭 Новостей пока нет. Добавьте первую!</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < news.length; i++) {
            let n = news[i];
            html += '<div class="news-item">';
            html += '<button class="delete-btn" onclick="deleteNews(' + n.id + ')">✕</button>';
            html += '<div class="news-date">📅 ' + escapeHtml(n.date) + '</div>';
            html += '<div class="news-title">' + escapeHtml(n.title) + '</div>';
            if (n.desc) html += '<div class="news-desc">' + escapeHtml(n.desc) + '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    
    load();
</script>

</body>
  </html>
