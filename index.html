<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАК России - Новости</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }
        
        .header {
            background: linear-gradient(135deg, #002B5E, #001a3a);
            color: white;
            padding: 24px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        
        .add-news-form {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .add-news-form h3 {
            font-size: 16px;
            color: #002B5E;
            margin-bottom: 12px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .submit-btn {
            background: #002B5E;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        
        .submit-btn:active {
            background: #003A80;
        }
        
        .news-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #002B5E;
            line-height: 1.4;
            margin-bottom: 8px;
            padding-right: 30px;
        }
        
        .news-description {
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .news-meta {
            font-size: 11px;
            color: #6b7280;
        }
        
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .delete-btn:active {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️ Национальный антитеррористический комитет</h1>
</div>

<div class="add-news-form">
    <h3>➕ Добавить новость</h3>
    <div class="form-group">
        <input type="text" id="newsTitle" placeholder="Заголовок новости">
    </div>
    <div class="form-group">
        <textarea id="newsDesc" placeholder="Описание (необязательно)" rows="2"></textarea>
    </div>
    <button class="submit-btn" onclick="addNews()">📢 Опубликовать</button>
</div>

<div id="newsContainer">
    <div class="empty-state">📭 Новостей пока нет. Добавьте первую!</div>
</div>

<script>
    const STORAGE_KEY = 'nac_news';
    
    function getNews() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            return JSON.parse(saved);
        }
        return [];
    }
    
    function saveNews(news) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(news));
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function addNews() {
        const titleInput = document.getElementById('newsTitle');
        const descInput = document.getElementById('newsDesc');
        
        const title = titleInput.value.trim();
        if (!title) {
            showToast('❌ Введите заголовок');
            return;
        }
        
        const news = getNews();
        const today = new Date();
        const dateStr = `${today.getDate()} ${today.toLocaleString('ru', { month: 'long' })} ${today.getFullYear()}`;
        
        const newNews = {
            id: Date.now(),
            date: dateStr,
            title: title,
            description: descInput.value.trim() || ''
        };
        
        news.unshift(newNews);
        saveNews(news);
        
        titleInput.value = '';
        descInput.value = '';
        
        renderNews();
        showToast('✅ Новость добавлена');
    }
    
    function deleteNews(id) {
        const news = getNews();
        const filtered = news.filter(item => item.id !== id);
        saveNews(filtered);
        renderNews();
        showToast('🗑️ Новость удалена');
    }
    
    function escapeText(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function renderNews() {
        const container = document.getElementById('newsContainer');
        const news = getNews();
        
        if (news.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 Новостей пока нет. Добавьте первую!</div>';
            return;
        }
        
        container.innerHTML = news.map(item => `
            <div class="news-card">
                <button class="delete-btn" onclick="deleteNews(${item.id})">✕</button>
                <div class="news-title">${escapeText(item.title)}</div>
                ${item.description ? `<div class="news-description">${escapeText(item.description)}</div>` : ''}
                <div class="news-meta">📅 ${escapeText(item.date)}</div>
            </div>
        `).join('');
    }
    
    renderNews();
</script>

</body>
</html>
